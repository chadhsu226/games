<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Greedy Snake 貪婪之蛇 | Chad's Game Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060612;
    --bg2: #0d0d24;
    --pink: #ff69b4;
    --yellow: #ffe44d;
    --green: #7fffb0;
    --purple: #a855f7;
    --gold: #ffd700;
    --red: #ff4d6a;
    --text: #e8e8ff;
    --muted: #6666aa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    touch-action: none;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.4) 0%, transparent 100%);
    pointer-events: none; z-index: 0;
  }

  header { text-align: center; padding: 18px 16px 8px; position: relative; z-index: 1; }
  .back {
    position: absolute; left: 14px; top: 16px;
    font-size: 0.75rem; color: var(--green); text-decoration: none;
    padding: 5px 12px; border: 1px solid rgba(127,255,176,0.4); border-radius: 16px;
    background: rgba(127,255,176,0.06);
  }
  .back:hover { background: rgba(127,255,176,0.15); }
  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.1rem, 4.5vw, 1.7rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--green), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .sub { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.12em; margin-top: 2px; }

  .hud {
    display: flex; gap: 18px; justify-content: center;
    font-family: 'Orbitron', sans-serif; font-size: 0.85rem;
    padding: 8px 0 6px; position: relative; z-index: 1;
  }
  .hud span b { color: var(--gold); }
  .hud .combo b { color: var(--pink); }
  .hud .best b { color: var(--green); }

  #wrap {
    position: relative; z-index: 1;
    border: 1px solid rgba(127,255,176,0.25);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(127,255,176,0.12), inset 0 0 60px rgba(13,13,36,0.8);
    background: var(--bg2);
    overflow: hidden;
  }
  canvas { display: block; }

  .overlay {
    position: absolute; inset: 0; z-index: 5;
    background: rgba(6,6,18,0.88);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 20px;
  }
  .overlay h2 {
    font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900;
    color: var(--gold); margin-bottom: 10px;
    filter: drop-shadow(0 0 14px rgba(255,215,0,0.5));
  }
  .overlay p { font-size: 0.85rem; color: var(--muted); line-height: 1.8; margin-bottom: 18px; }
  .overlay p b { color: var(--text); }
  .overlay .final { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--gold); margin-bottom: 6px; }
  .newbest { color: var(--pink); font-size: 0.8rem; margin-bottom: 12px; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }
  .btn {
    font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 600;
    padding: 12px 34px; border: none; border-radius: 26px; cursor: pointer;
    background: linear-gradient(135deg, var(--green), #2ac069); color: #04120a;
    box-shadow: 0 0 24px rgba(127,255,176,0.35);
  }
  .btn:active { transform: scale(0.96); }
  .hidden { display: none !important; }

  .hint { font-size: 0.7rem; color: var(--muted); padding: 10px; text-align: center; position: relative; z-index: 1; }

  /* 手機方向鍵 */
  #pad {
    display: none; position: relative; z-index: 1;
    grid-template-columns: repeat(3, 58px); grid-template-rows: repeat(2, 48px);
    gap: 6px; padding: 10px;
  }
  #pad button {
    background: rgba(127,255,176,0.08); border: 1px solid rgba(127,255,176,0.3);
    border-radius: 10px; color: var(--green); font-size: 1.1rem;
  }
  #pad button:active { background: rgba(127,255,176,0.25); }
  #pad .u { grid-column: 2; grid-row: 1; }
  #pad .l { grid-column: 1; grid-row: 2; }
  #pad .d { grid-column: 2; grid-row: 2; }
  #pad .r { grid-column: 3; grid-row: 2; }
  @media (pointer: coarse) { #pad { display: grid; } .hint .kb { display: none; } }
</style>
</head>
<body>

<header>
  <a class="back" href="index.html">← 返回</a>
  <h1>GREEDY SNAKE 貪婪之蛇</h1>
  <div class="sub">吃金幣・避股災・別咬到自己</div>
</header>

<div class="hud">
  <span>資產 <b id="score">$0</b></span>
  <span class="combo">連擊 <b id="combo">×1</b></span>
  <span class="best">最佳 <b id="best">$0</b></span>
</div>

<div id="wrap">
  <canvas id="cv"></canvas>
  <div class="overlay" id="startScr">
    <h2>GREEDY SNAKE</h2>
    <p>吃 <b style="color:var(--gold)">金幣 $</b> 增加資產、蛇身變長<br>
       快速連吃觸發 <b style="color:var(--pink)">連擊加倍</b>（最高 ×5）<br>
       小心 <b style="color:var(--red)">股災 📉</b>——碰到直接畢業<br>
       速度會越來越快，貪婪要有節制！</p>
    <button class="btn" id="startBtn">▶ 開始遊戲</button>
  </div>
  <div class="overlay hidden" id="overScr">
    <h2 id="overTitle">💥 市場畢業</h2>
    <div class="final" id="finalScore">$0</div>
    <div class="newbest hidden" id="newBest">🏆 新紀錄！</div>
    <p id="overMsg"></p>
    <button class="btn" id="retryBtn">↻ 再來一局</button>
  </div>
</div>

<div id="pad">
  <button class="u">▲</button>
  <button class="l">◀</button>
  <button class="d">▼</button>
  <button class="r">▶</button>
</div>

<div class="hint"><span class="kb">方向鍵 / WASD 控制，</span>手機可滑動或用方向鈕</div>

<script>
(() => {
  const N = 21;                    // 21×21 格
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  let cell = 20;

  function fit() {
    const maxW = Math.min(window.innerWidth - 24, 440);
    const maxH = window.innerHeight - 240;
    cell = Math.max(12, Math.floor(Math.min(maxW, maxH) / N));
    cv.width = cv.height = cell * N;
  }
  fit();
  window.addEventListener('resize', () => { fit(); draw(); });

  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const bestEl = document.getElementById('best');
  let best = +(localStorage.getItem('greedySnakeBest') || 0);
  bestEl.textContent = '$' + best;

  let snake, dir, nextDir, coin, crashes, score, combo, comboTimer,
      speed, timer = null, alive = false, growQueue;

  function reset() {
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir = {x:1,y:0}; nextDir = dir;
    crashes = [];
    score = 0; combo = 1; comboTimer = 0; growQueue = 0;
    speed = 150;
    placeCoin();
    updateHud();
  }

  function rndCell() {
    return { x: Math.floor(Math.random()*N), y: Math.floor(Math.random()*N) };
  }
  function occupied(p) {
    return snake.some(s => s.x===p.x && s.y===p.y) ||
           (coin && coin.x===p.x && coin.y===p.y) ||
           crashes.some(c => c.x===p.x && c.y===p.y);
  }
  function placeCoin() {
    let p; do { p = rndCell(); } while (occupied(p));
    coin = p;
  }
  function placeCrash() {
    if (crashes.length >= 4) return;
    let p, tries = 0;
    do { p = rndCell(); tries++; } while ((occupied(p) || nearHead(p)) && tries < 50);
    if (tries < 50) crashes.push({ ...p, life: 60 + Math.floor(Math.random()*40) });
  }
  function nearHead(p) {
    const h = snake[0];
    return Math.abs(p.x-h.x) + Math.abs(p.y-h.y) < 4;
  }

  function step() {
    dir = nextDir;
    const h = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // 撞牆 / 撞自己 / 撞股災
    if (h.x<0 || h.x>=N || h.y<0 || h.y>=N ||
        snake.some(s => s.x===h.x && s.y===h.y) ||
        crashes.some(c => c.x===h.x && c.y===h.y)) {
      return gameOver(h.x<0||h.x>=N||h.y<0||h.y>=N ? '撞到市場邊界了' :
             crashes.some(c=>c.x===h.x&&c.y===h.y) ? '一頭撞進股災，資產瞬間蒸發' : '咬到自己，槓桿開太大');
    }

    snake.unshift(h);

    if (h.x===coin.x && h.y===coin.y) {
      // 連擊：8 步內連吃 → 倍數 +1（上限 5）
      combo = comboTimer > 0 ? Math.min(combo+1, 5) : 1;
      comboTimer = 8 * combo;
      score += 10 * combo;
      growQueue += 1;
      placeCoin();
      if (score >= 50 && Math.random() < 0.5) placeCrash();
      speed = Math.max(70, 150 - Math.floor(score/40)*8);
      restartTimer();
    }

    if (growQueue > 0) growQueue--;
    else snake.pop();

    if (comboTimer > 0) { comboTimer--; if (comboTimer===0) combo = 1; }
    crashes = crashes.filter(c => --c.life > 0);

    updateHud();
    draw();
  }

  function updateHud() {
    scoreEl.textContent = '$' + score;
    comboEl.textContent = '×' + combo;
  }

  function draw() {
    ctx.fillStyle = '#0d0d24';
    ctx.fillRect(0,0,cv.width,cv.height);
    // 格線
    ctx.strokeStyle = 'rgba(102,102,170,0.08)';
    ctx.lineWidth = 1;
    for (let i=1;i<N;i++) {
      ctx.beginPath(); ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,cv.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*cell); ctx.lineTo(cv.width,i*cell); ctx.stroke();
    }
    // 金幣
    if (coin) {
      const cx = coin.x*cell+cell/2, cy = coin.y*cell+cell/2;
      ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 12;
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(cx,cy,cell*0.36,0,7); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#4d3a00';
      ctx.font = `bold ${cell*0.5}px Orbitron, sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('$', cx, cy+1);
    }
    // 股災
    crashes.forEach(c => {
      const a = c.life < 20 ? (c.life % 6 < 3 ? 0.25 : 0.9) : 0.9;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#ff4d6a';
      ctx.shadowColor = '#ff4d6a'; ctx.shadowBlur = 10;
      const p = 2;
      ctx.fillRect(c.x*cell+p, c.y*cell+p, cell-2*p, cell-2*p);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#3a000d';
      ctx.font = `${cell*0.6}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('📉', c.x*cell+cell/2, c.y*cell+cell/2+1);
      ctx.globalAlpha = 1;
    });
    // 蛇
    snake.forEach((s,i) => {
      const t = i / snake.length;
      ctx.fillStyle = i===0 ? '#b8ffd6' : `rgba(127,255,176,${0.95 - t*0.55})`;
      if (i===0) { ctx.shadowColor = '#7fffb0'; ctx.shadowBlur = 14; }
      const p = i===0 ? 1.5 : 2.5;
      const r = Math.max(3, cell*0.22);
      roundRect(s.x*cell+p, s.y*cell+p, cell-2*p, cell-2*p, r);
      ctx.shadowBlur = 0;
      if (i===0) { // 眼睛
        ctx.fillStyle = '#04120a';
        const ex = dir.x, ey = dir.y, c2 = cell/2;
        ctx.beginPath();
        ctx.arc(s.x*cell+c2+ex*3-ey*4, s.y*cell+c2+ey*3+ex*4, cell*0.08, 0, 7);
        ctx.arc(s.x*cell+c2+ex*3+ey*4, s.y*cell+c2+ey*3-ex*4, cell*0.08, 0, 7);
        ctx.fill();
      }
    });
  }
  function roundRect(x,y,w,h,r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.fill();
  }

  function restartTimer() {
    if (timer) clearInterval(timer);
    timer = setInterval(step, speed);
  }

  function start() {
    reset();
    document.getElementById('startScr').classList.add('hidden');
    document.getElementById('overScr').classList.add('hidden');
    alive = true;
    draw();
    restartTimer();
  }

  function gameOver(msg) {
    alive = false;
    clearInterval(timer); timer = null;
    const nb = document.getElementById('newBest');
    if (score > best) {
      best = score;
      localStorage.setItem('greedySnakeBest', best);
      bestEl.textContent = '$' + best;
      nb.classList.remove('hidden');
    } else nb.classList.add('hidden');
    document.getElementById('finalScore').textContent = '$' + score;
    document.getElementById('overMsg').textContent = msg + '。蛇長 ' + snake.length + ' 格。';
    document.getElementById('overScr').classList.remove('hidden');
  }

  function turn(x, y) {
    if (!alive) return;
    if (x === -dir.x && y === -dir.y) return; // 不能 180 度回頭
    nextDir = {x, y};
  }

  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()) || 'wasd'.includes(k)) e.preventDefault();
    if (k==='arrowup'||k==='w') turn(0,-1);
    else if (k==='arrowdown'||k==='s') turn(0,1);
    else if (k==='arrowleft'||k==='a') turn(-1,0);
    else if (k==='arrowright'||k==='d') turn(1,0);
  }, {passive:false});

  // 觸控滑動
  let tx=0, ty=0;
  cv.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
  cv.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;
    if (Math.abs(dx) > Math.abs(dy)) turn(Math.sign(dx), 0);
    else turn(0, Math.sign(dy));
  }, {passive:true});

  // 方向鈕
  const pad = document.getElementById('pad');
  pad.querySelector('.u').addEventListener('click', () => turn(0,-1));
  pad.querySelector('.d').addEventListener('click', () => turn(0,1));
  pad.querySelector('.l').addEventListener('click', () => turn(-1,0));
  pad.querySelector('.r').addEventListener('click', () => turn(1,0));

  document.getElementById('startBtn').addEventListener('click', start);
  document.getElementById('retryBtn').addEventListener('click', start);

  reset(); draw();
})();
</script>
</body>
</html>
